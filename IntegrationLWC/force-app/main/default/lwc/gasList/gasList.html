<template>
    <lightning-card title="Gas Prices">
        <lightning-layout class="slds-p-around_medium">
            <lightning-layout-item size="5">
                <lightning-input type="text" label="Enter State" name="state" onchange={handleChange}>

                </lightning-input>
            </lightning-layout-item>
            <lightning-layout-item class="slds-m-top_large slds-m-left_medium">
                <lightning-button variant="brand" label="GetGasPrices" onclick={handleClick}></lightning-button>
            </lightning-layout-item>
        </lightning-layout>
    </lightning-card>
   <lightning-card title={showState}>
        <template if:true={stateData}>
            <lightning-layout class="slds-p-around_medium">
                <lightning-layout-item size="12"  >
        <p><b>State:</b> {stateData.name}</p>
            <p><b>Lower Name:</b> {stateData.lowername}</p>
            <p><b>Currency:</b> {stateData.currency}</p>
            <p><b>Gasoline:</b> {stateData.gasoline}</p>
            <p><b>Mid Grade:</b> {stateData.midGrade}</p>
            <p><b>Premium:</b> {stateData.premium}</p>
            <p><b>Diesel:</b> {stateData.diesel}</p>


                </lightning-layout-item>
            
        </lightning-layout>
        </template>
        <template if:true={cityData}>
    <lightning-card title="City-wise Fuel Prices" class="slds-m-top_medium">

        <div class="slds-p-around_medium">
            <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                <thead>
                    <tr>
                        <th>City</th>
                        <th>Gasoline</th>
                        <th>Mid Grade</th>
                        <th>Premium</th>
                        <th>Diesel</th>
                    </tr>
                </thead>

                <tbody>
                    <template for:each={cityData} for:item="city">
                        <tr key={city.lowername}>
                            <td>{city.name}</td>
                            <td>{city.gasoline}</td>
                            <td>{city.midGrade}</td>
                            <td>{city.premium}</td>
                            <td>{city.diesel}</td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

    </lightning-card>
</template>



<template if:false={stateData}>
            <div class="slds-p-around_medium">
                {showState}
            </div>
        </template>
    </lightning-card>
</template>
